<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Velha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:  #e8506a;
    --blush: #f9c0cb;
    --deep:  #1a0a0e;
    --card:  #2a1018;
    --gold:  #f0c060;
    --white: #fff5f7;
  }

  html {
    height: 100%;
    overflow: hidden;
  }

  body {
    height: 100%;
    max-height: 100dvh;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Lato', sans-serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    touch-action: none; /* bloqueia scroll por toque no mobile */
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--blush);
    letter-spacing: .06em;
    margin-bottom: .9rem;
    text-align: center;
  }

  #pips-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .3rem;
    margin-bottom: .7rem;
  }

  .pip {
    width: 10px; height: 10px; border-radius: 50%;
    background: #5a2535; border: 1.5px solid #8a3545;
    transition: background .3s;
  }
  .pip.done { background: var(--rose); border-color: var(--rose); }

  #status {
    font-size: .9rem; color: var(--blush);
    margin-bottom: .85rem; min-height: 1.2rem;
    letter-spacing: .04em; text-align: center;
  }

  #board-wrap { width: min(280px, 78vw); }
  #board {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 7px;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--card);
    border: 1.5px solid #5a2535;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, transform .1s, border-color .15s;
    user-select: none;
    overflow: hidden;
  }
  .cell:hover:not(.taken):not(.locked) {
    background: #3d1520;
    border-color: var(--rose);
    transform: scale(1.04);
  }
  /* bloqueado após fim do jogo */
  .cell.locked { cursor: default; pointer-events: none; }
  .cell.taken  { cursor: default; }
  .cell.win-cell {
    background: #5a0f22;
    border-color: var(--gold);
    animation: pulse-cell .6s ease infinite alternate;
  }
  @keyframes pulse-cell { to { box-shadow: 0 0 18px var(--rose); } }

  .mark {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    font-size: 2.5rem;
    line-height: 1;
    animation: pop .25s cubic-bezier(.175,.885,.32,1.275);
  }
  .mark.x { font-size: 2.5rem; }
  .mark.o { font-size: 4.8rem; }
  @keyframes pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1)  rotate(0deg);  opacity: 1; }
  }

  #btn-restart {
    display: none;
    margin-top: 1.2rem;
    padding: .5rem 1.4rem;
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: .8rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #btn-restart:hover { background: var(--rose); color: var(--white); }

  /* OVERLAY */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,0,5,.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .6s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }

  .love-box {
    text-align: center;
    padding: 1.8rem 2rem 2rem;
    background: var(--card);
    border: 1.5px solid #7a2540;
    border-radius: 20px;
    max-width: 380px;
    width: 90vw;
  }

  .love-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    color: var(--blush);
    margin-bottom: .9rem;
  }

  #love-board {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 7px;
    width: min(220px, 65vw);
    margin: 0 auto 1rem;
  }
  .love-cell {
    aspect-ratio: 1;
    background: #1e0a10;
    border: 1.5px solid #6a2535;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    transition: background .2s;
  }
  .love-cell.filled   { background: #3d0f1e; border-color: var(--rose); }
  .love-cell.win-love {
    background: #6a0f28;
    border-color: var(--gold);
    animation: pulse-cell .5s ease infinite alternate;
  }

  .love-mark {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
    line-height: 1;
    animation: heartPop .4s cubic-bezier(.175,.885,.32,1.275) forwards;
    opacity: 0;
  }
  .love-mark.x { font-size: 1.5rem; }
  .love-mark.h { font-size: 2.2rem; }
  @keyframes heartPop {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    70%  { transform: scale(1.3) rotate(5deg);  opacity: 1; }
    100% { transform: scale(1)  rotate(0deg);   opacity: 1; }
  }

  #love-message {
    font-family: 'Playfair Display', serif;
    font-size: clamp(.95rem, 3vw, 1.2rem);
    color: var(--gold);
    line-height: 1.6;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .7s .1s, transform .7s .1s;
    margin-top: .4rem;
  }
  #love-message.show { opacity: 1; transform: translateY(0); }

  #btn-close {
    display: none;
    margin-top: 1rem;
    padding: .5rem 1.4rem;
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: .8rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #btn-close:hover { background: var(--rose); color: var(--white); }

  .burst-heart {
    position: fixed;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 200;
    animation: burst 1.4s ease-out forwards;
  }
  @keyframes burst {
    0%   { transform: translate(0,0) scale(1);                  opacity: 1; }
    100% { transform: translate(var(--dx),var(--dy)) scale(.2); opacity: 0; }
  }
</style>
</head>
<body>

<h1>Jogo da Velha</h1>

<div id="pips-wrap">
  <div style="display:flex;align-items:center;gap:.5rem;">
    <span style="font-size:.7rem;color:#b07080;letter-spacing:.08em;width:40px;text-align:right;">J1 x</span>
    <div style="display:flex;gap:.4rem;">
      <div class="pip" id="px0"></div>
      <div class="pip" id="px1"></div>
      <div class="pip" id="px2"></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:.5rem;">
    <span style="font-size:.7rem;color:#b07080;letter-spacing:.08em;width:40px;text-align:right;">J2 ○</span>
    <div style="display:flex;gap:.4rem;">
      <div class="pip" id="po0"></div>
      <div class="pip" id="po1"></div>
      <div class="pip" id="po2"></div>
    </div>
  </div>
</div>

<div id="status">Vez do Jogador 1 x</div>

<div id="board-wrap">
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
</div>

<button id="btn-restart">Próxima rodada</button>

<div id="overlay">
  <div class="love-box">
    <div class="love-title" id="love-title">Jogo do Amor</div>
    <div id="love-board">
      <div class="love-cell" data-li="0"></div>
      <div class="love-cell" data-li="1"></div>
      <div class="love-cell" data-li="2"></div>
      <div class="love-cell" data-li="3"></div>
      <div class="love-cell" data-li="4"></div>
      <div class="love-cell" data-li="5"></div>
      <div class="love-cell" data-li="6"></div>
      <div class="love-cell" data-li="7"></div>
      <div class="love-cell" data-li="8"></div>
    </div>
    <div id="love-message"></div>
    <button id="btn-close">Jogar de novo</button>
  </div>
</div>

<script>
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];
const WINS_TO_TRIGGER = 3;

let board, turn, gameOver;
let scoreX = 0, scoreO = 0, roundNum = 1;

function lockAllCells() {
  document.querySelectorAll('.cell').forEach(c => c.classList.add('locked'));
}

function init() {
  board    = Array(9).fill(null);
  turn     = 'X';
  gameOver = false;
  document.getElementById('board').style.pointerEvents = ''; // restaura cliques
  document.querySelectorAll('.cell').forEach(c => {
    c.innerHTML = '';
    c.classList.remove('taken','win-cell','locked');
  });
  setStatus('Vez do Jogador 1 x');
  document.getElementById('btn-restart').style.display = 'none';
  refreshUI();
}

function refreshUI() {
  for (let i = 0; i < WINS_TO_TRIGGER; i++)
    document.getElementById('px'+i).classList.toggle('done', i < scoreX);
  for (let i = 0; i < WINS_TO_TRIGGER; i++)
    document.getElementById('po'+i).classList.toggle('done', i < scoreO);
}

function setStatus(txt) { document.getElementById('status').textContent = txt; }

init();

document.getElementById('board').addEventListener('click', e => {
  const cell = e.target.closest('.cell');
  if (!cell || gameOver || cell.classList.contains('taken') || cell.classList.contains('locked')) return;
  play(+cell.dataset.i);
});

function play(i) {
  board[i] = turn;
  const cell = document.querySelector(`.cell[data-i="${i}"]`);
  cell.classList.add('taken');
  const div = document.createElement('div');
  div.className = turn === 'X' ? 'mark x' : 'mark o';
  div.textContent = turn === 'X' ? 'x' : '○';
  cell.appendChild(div);

  const winLine = checkWin(turn);
  if (winLine)             { endRound(turn, winLine); return; }
  if (board.every(v => v)) { endRound(null, null);    return; }

  turn = turn === 'X' ? 'O' : 'X';
  setStatus(turn === 'X' ? 'Vez do Jogador 1 x' : 'Vez do Jogador 2 ○');
}

function checkWin(mark) {
  for (const line of WIN_LINES)
    if (line.every(i => board[i] === mark)) return line;
  return null;
}

function endRound(winner, line) {
  gameOver = true;
  lockAllCells(); // bloqueia todos os quadrados imediatamente
  document.getElementById('board').style.pointerEvents = 'none'; // garantia extra

  if (winner === 'X') scoreX++;
  if (winner === 'O') scoreO++;
  roundNum++;
  refreshUI();

  if (line) line.forEach(i =>
    document.querySelector(`.cell[data-i="${i}"]`).classList.add('win-cell'));

  if (winner === 'X')      setStatus('Jogador 1 venceu essa rodada!');
  else if (winner === 'O') setStatus('Jogador 2 venceu essa rodada!');
  else                     setStatus('Empate!');

  if (scoreX >= WINS_TO_TRIGGER || scoreO >= WINS_TO_TRIGGER) {
    if (!loveShown) {
      setTimeout(showLoveOverlay, 1600);
    } else {
      const champ = scoreX >= WINS_TO_TRIGGER ? 'Jogador 1 x' : 'Jogador 2 ○';
      setStatus(`🏆 ${champ} venceu o campeonato!`);
      scoreX = 0; scoreO = 0; roundNum = 1;
      refreshUI();
      document.getElementById('btn-restart').style.display = 'inline-block';
    }
  } else {
    document.getElementById('btn-restart').style.display = 'inline-block';
  }
}

document.getElementById('btn-restart').addEventListener('click', () => {
  init();
});

// ── TABULEIRO DO AMOR ─────────────────────────────────────────────
const LOVE_SEQUENCE = [
  { i: 4, s: '♥' },
  { i: 2, s: '✕' },
  { i: 0, s: '♥' },
  { i: 6, s: '✕' },
  { i: 3, s: '♥' },
  { i: 1, s: '✕' },
  { i: 8, s: '♥' },
];
const LOVE_WIN_LINE = [0, 4, 8];

let loveShown = false;

function showLoveOverlay() {
  if (loveShown) return;
  loveShown = true;
  document.querySelectorAll('.love-cell').forEach(c => {
    c.innerHTML = '';
    c.classList.remove('filled','win-love');
  });
  const msg = document.getElementById('love-message');
  msg.classList.remove('show');
  msg.innerHTML = '';
  document.getElementById('btn-close').style.display = 'none';
  document.getElementById('overlay').classList.add('show');

  LOVE_SEQUENCE.forEach(({ i, s }, step) => {
    setTimeout(() => {
      const cell = document.querySelector(`.love-cell[data-li="${i}"]`);
      cell.classList.add('filled');
      const div = document.createElement('div');
      div.className = s === '✕' ? 'love-mark x' : 'love-mark h';
      div.textContent = s;
      cell.appendChild(div);

      if (step === LOVE_SEQUENCE.length - 1) {
        setTimeout(() => {
          LOVE_WIN_LINE.forEach(wi =>
            document.querySelector(`.love-cell[data-li="${wi}"]`).classList.add('win-love'));
          setTimeout(showMessage, 700);
        }, 350);
      }
    }, step * 600);
  });
}

function showMessage() {
  const msg = document.getElementById('love-message');
  msg.innerHTML = 'No jogo do Amor,<br>você já ganhou meu coração.';
  msg.classList.add('show');
  document.getElementById('btn-close').style.display = 'inline-block';
  burstHearts();
}

function burstHearts() {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for (let i = 0; i < 28; i++) {
    const h = document.createElement('div');
    h.className = 'burst-heart';
    h.textContent = ['❤️','💕','💗','💖'][i%4];
    const angle = Math.random()*Math.PI*2;
    const dist  = 80 + Math.random()*220;
    h.style.left = cx+'px'; h.style.top = cy+'px';
    h.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    h.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    h.style.animationDelay = (Math.random()*.5)+'s';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 2000);
  }
}

document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  scoreX = 0; scoreO = 0; roundNum = 1;
  refreshUI(); init();
});
</script>
<script>
  // Bloqueia scroll por toque em todo o documento
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
