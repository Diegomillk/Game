<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Velha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:  #e8506a;
    --blush: #f9c0cb;
    --deep:  #1a0a0e;
    --card:  #2a1018;
    --gold:  #f0c060;
    --white: #fff5f7;
  }

  html { height: 100%; overflow: hidden; }

  body {
    height: 100%;
    max-height: 100dvh;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Lato', sans-serif;
    color: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    touch-action: none;
  }

  /* STATUS */
  #status {
    font-family: 'Playfair Display', serif;
    font-size: clamp(.95rem, 3vw, 1.15rem);
    color: var(--blush);
    letter-spacing: .05em;
    text-align: center;
    min-height: 1.4rem;
  }

  /* SCOREBOARD */
  #scoreboard {
    display: flex;
    align-items: center;
    gap: 8px;
    width: min(280px, 78vw);
  }

  .score-card {
    flex: 1;
    background: var(--card);
    border: 1.5px solid #5a2535;
    border-radius: 12px;
    padding: .5rem .55rem;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    transition: border-color .3s, background .3s;
    position: relative;
    overflow: hidden;
  }
  .score-card.active {
    border-color: var(--rose);
    background: #35101e;
  }
  .score-card.active::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--rose);
    border-radius: 12px 0 0 12px;
  }

  .score-icon { width: 24px; height: 24px; flex-shrink: 0; }
  .score-icon svg { width: 100%; height: 100%; display: block; }

  .score-info { display: flex; flex-direction: column; gap: 3px; flex: 1; }

  .score-label {
    font-size: .5rem;
    color: #b07080;
    letter-spacing: .07em;
    text-transform: uppercase;
    line-height: 1;
  }
  .score-card.active .score-label { color: var(--blush); }

  .score-pips { display: flex; gap: 4px; }
  .pip {
    width: 7px; height: 7px; border-radius: 50%;
    background: #5a2535; border: 1px solid #8a3545;
    transition: background .3s;
  }
  .pip.done { background: var(--rose); border-color: var(--rose); }

  .score-vs {
    font-family: 'Playfair Display', serif;
    font-size: .7rem;
    color: #7a3545;
    letter-spacing: .06em;
    flex-shrink: 0;
  }

  /* BOARD */
  #board-wrap { width: min(280px, 78vw); }
  #board {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 7px;
  }

  .cell {
    aspect-ratio: 1;
    background: var(--card);
    border: 1.5px solid #5a2535;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .15s, transform .1s, border-color .15s;
    user-select: none;
    overflow: hidden;
    position: relative;
  }
  .cell:hover:not(.taken):not(.locked) {
    background: #3d1520;
    border-color: var(--rose);
    transform: scale(1.04);
  }
  .cell.locked  { cursor: default; pointer-events: none; }
  .cell.taken   { cursor: default; }
  .cell.win-cell {
    background: #5a0f22;
    border-color: var(--gold);
    animation: pulse-cell .6s ease infinite alternate;
  }
  @keyframes pulse-cell { to { box-shadow: 0 0 18px var(--rose); } }

  .mark {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    animation: pop .28s cubic-bezier(.175,.885,.32,1.275) forwards;
  }
  @keyframes pop {
    0%   { transform: scale(0) rotate(-18deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  .mark svg { width: 54%; height: 54%; display: block; }
  .mark-x line { stroke: var(--rose); stroke-width: 8; stroke-linecap: round; }
  .mark-o circle { fill: none; stroke: var(--blush); stroke-width: 7; stroke-linecap: round; }

  /* BUTTON */
  #btn-restart {
    display: none;
    padding: .45rem 1.3rem;
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: .78rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #btn-restart:hover { background: var(--rose); color: var(--white); }

  /* OVERLAY */
  #overlay {
    position: fixed; inset: 0;
    background: rgba(10,0,5,.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .6s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }

  .love-box {
    text-align: center;
    padding: 1.8rem 2rem 2rem;
    background: var(--card);
    border: 1.5px solid #7a2540;
    border-radius: 20px;
    max-width: 380px;
    width: 90vw;
  }
  .love-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    color: var(--blush);
    margin-bottom: .9rem;
  }
  #love-board {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 7px;
    width: min(220px, 65vw);
    margin: 0 auto 1rem;
  }
  .love-cell {
    aspect-ratio: 1;
    background: #1e0a10;
    border: 1.5px solid #6a2535;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    transition: background .2s;
  }
  .love-cell.filled   { background: #3d0f1e; border-color: var(--rose); }
  .love-cell.win-love {
    background: #6a0f28; border-color: var(--gold);
    animation: pulse-cell .5s ease infinite alternate;
  }
  .love-mark {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    animation: heartPop .4s cubic-bezier(.175,.885,.32,1.275) forwards;
    opacity: 0;
  }
  .love-mark svg { width: 55%; height: 55%; display: block; }
  .love-mark.x-love line { stroke: var(--rose); stroke-width: 9; stroke-linecap: round; }
  .love-mark.h-love path { fill: var(--rose); }
  @keyframes heartPop {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    70%  { transform: scale(1.25) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  #love-message {
    font-family: 'Playfair Display', serif;
    font-size: clamp(.95rem, 3vw, 1.2rem);
    color: var(--gold); line-height: 1.6;
    opacity: 0; transform: translateY(12px);
    transition: opacity .7s .1s, transform .7s .1s;
    margin-top: .4rem;
  }
  #love-message.show { opacity: 1; transform: translateY(0); }
  #btn-close {
    display: none;
    margin-top: 1rem;
    padding: .5rem 1.4rem;
    background: transparent;
    border: 1.5px solid var(--rose);
    color: var(--rose);
    border-radius: 50px;
    font-family: 'Lato', sans-serif;
    font-size: .8rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #btn-close:hover { background: var(--rose); color: var(--white); }

  .burst-heart {
    position: fixed; font-size: 1.4rem;
    pointer-events: none; z-index: 200;
    animation: burst 1.4s ease-out forwards;
  }
  @keyframes burst {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx),var(--dy)) scale(.2); opacity: 0; }
  }
</style>
</head>
<body>

<div id="status">Vez do Jogador 1</div>

<div id="scoreboard">
  <div class="score-card active" id="card-x">
    <div class="score-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <line x1="18" y1="18" x2="82" y2="82" stroke="#e8506a" stroke-width="14" stroke-linecap="round"/>
        <line x1="82" y1="18" x2="18" y2="82" stroke="#e8506a" stroke-width="14" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="score-info">
      <div class="score-label">Jogador 1</div>
      <div class="score-pips">
        <div class="pip" id="px0"></div>
        <div class="pip" id="px1"></div>
        <div class="pip" id="px2"></div>
      </div>
    </div>
  </div>

  <div class="score-vs">vs</div>

  <div class="score-card" id="card-o">
    <div class="score-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="34" fill="none" stroke="#f9c0cb" stroke-width="13" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="score-info">
      <div class="score-label">Jogador 2</div>
      <div class="score-pips">
        <div class="pip" id="po0"></div>
        <div class="pip" id="po1"></div>
        <div class="pip" id="po2"></div>
      </div>
    </div>
  </div>
</div>

<div id="board-wrap">
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>
</div>

<button id="btn-restart">Próxima rodada</button>

<div id="overlay">
  <div class="love-box">
    <div class="love-title" id="love-title">Jogo do Amor</div>
    <div id="love-board">
      <div class="love-cell" data-li="0"></div>
      <div class="love-cell" data-li="1"></div>
      <div class="love-cell" data-li="2"></div>
      <div class="love-cell" data-li="3"></div>
      <div class="love-cell" data-li="4"></div>
      <div class="love-cell" data-li="5"></div>
      <div class="love-cell" data-li="6"></div>
      <div class="love-cell" data-li="7"></div>
      <div class="love-cell" data-li="8"></div>
    </div>
    <div id="love-message"></div>
    <button id="btn-close">Jogar de novo</button>
  </div>
</div>

<script>
function svgX() {
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="20" x2="80" y2="80"/><line x1="80" y1="20" x2="20" y2="80"/>
  </svg>`;
}
function svgO() {
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="33"/>
  </svg>`;
}
function svgHeart() {
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 82 C50 82 15 58 15 35 C15 22 25 14 35 14 C42 14 48 18 50 22 C52 18 58 14 65 14 C75 14 85 22 85 35 C85 58 50 82 50 82Z"/>
  </svg>`;
}
function svgXLove() {
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="20" x2="80" y2="80"/><line x1="80" y1="20" x2="20" y2="80"/>
  </svg>`;
}

const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];
const WINS_TO_TRIGGER = 3;
let board, turn, gameOver;
let scoreX = 0, scoreO = 0, roundNum = 1;

function lockAllCells() {
  document.querySelectorAll('.cell').forEach(c => c.classList.add('locked'));
}

function init() {
  board = Array(9).fill(null);
  turn = 'X';
  gameOver = false;
  document.getElementById('board').style.pointerEvents = '';
  document.querySelectorAll('.cell').forEach(c => {
    c.innerHTML = '';
    c.classList.remove('taken','win-cell','locked');
  });
  setStatus('Vez do Jogador 1');
  document.getElementById('btn-restart').style.display = 'none';
  refreshUI();
}

function refreshUI() {
  for (let i = 0; i < WINS_TO_TRIGGER; i++)
    document.getElementById('px'+i).classList.toggle('done', i < scoreX);
  for (let i = 0; i < WINS_TO_TRIGGER; i++)
    document.getElementById('po'+i).classList.toggle('done', i < scoreO);
  document.getElementById('card-x').classList.toggle('active', turn === 'X');
  document.getElementById('card-o').classList.toggle('active', turn === 'O');
}

function setStatus(txt) { document.getElementById('status').textContent = txt; }

init();

document.getElementById('board').addEventListener('click', e => {
  const cell = e.target.closest('.cell');
  if (!cell || gameOver || cell.classList.contains('taken') || cell.classList.contains('locked')) return;
  play(+cell.dataset.i);
});

function play(i) {
  board[i] = turn;
  const cell = document.querySelector(`.cell[data-i="${i}"]`);
  cell.classList.add('taken');
  const div = document.createElement('div');
  if (turn === 'X') { div.className = 'mark mark-x'; div.innerHTML = svgX(); }
  else              { div.className = 'mark mark-o'; div.innerHTML = svgO(); }
  cell.appendChild(div);

  const winLine = checkWin(turn);
  if (winLine)             { endRound(turn, winLine); return; }
  if (board.every(v => v)) { endRound(null, null);    return; }

  turn = turn === 'X' ? 'O' : 'X';
  setStatus(turn === 'X' ? 'Vez do Jogador 1' : 'Vez do Jogador 2');
  refreshUI();
}

function checkWin(mark) {
  for (const line of WIN_LINES)
    if (line.every(i => board[i] === mark)) return line;
  return null;
}

function endRound(winner, line) {
  gameOver = true;
  lockAllCells();
  document.getElementById('board').style.pointerEvents = 'none';
  if (winner === 'X') scoreX++;
  if (winner === 'O') scoreO++;
  roundNum++;
  refreshUI();
  if (line) line.forEach(i =>
    document.querySelector(`.cell[data-i="${i}"]`).classList.add('win-cell'));
  if (winner === 'X')      setStatus('Jogador 1 venceu essa rodada!');
  else if (winner === 'O') setStatus('Jogador 2 venceu essa rodada!');
  else                     setStatus('Empate!');
  if (scoreX >= WINS_TO_TRIGGER || scoreO >= WINS_TO_TRIGGER) {
    if (!loveShown) {
      setTimeout(showLoveOverlay, 1600);
    } else {
      const champ = scoreX >= WINS_TO_TRIGGER ? 'Jogador 1' : 'Jogador 2';
      setStatus(`${champ} venceu o campeonato! 🏆`);
      scoreX = 0; scoreO = 0; roundNum = 1;
      refreshUI();
      document.getElementById('btn-restart').style.display = 'inline-block';
    }
  } else {
    document.getElementById('btn-restart').style.display = 'inline-block';
  }
}

document.getElementById('btn-restart').addEventListener('click', () => { init(); });

const LOVE_SEQUENCE = [
  { i: 4, s: 'h' }, { i: 2, s: 'x' }, { i: 0, s: 'h' },
  { i: 6, s: 'x' }, { i: 3, s: 'h' }, { i: 1, s: 'x' }, { i: 8, s: 'h' },
];
const LOVE_WIN_LINE = [0, 4, 8];
let loveShown = false;

function showLoveOverlay() {
  if (loveShown) return;
  loveShown = true;
  document.querySelectorAll('.love-cell').forEach(c => {
    c.innerHTML = ''; c.classList.remove('filled','win-love');
  });
  const msg = document.getElementById('love-message');
  msg.classList.remove('show'); msg.innerHTML = '';
  document.getElementById('btn-close').style.display = 'none';
  document.getElementById('overlay').classList.add('show');
  LOVE_SEQUENCE.forEach(({ i, s }, step) => {
    setTimeout(() => {
      const cell = document.querySelector(`.love-cell[data-li="${i}"]`);
      cell.classList.add('filled');
      const div = document.createElement('div');
      if (s === 'x') { div.className = 'love-mark x-love'; div.innerHTML = svgXLove(); }
      else           { div.className = 'love-mark h-love';  div.innerHTML = svgHeart(); }
      cell.appendChild(div);
      if (step === LOVE_SEQUENCE.length - 1) {
        setTimeout(() => {
          LOVE_WIN_LINE.forEach(wi =>
            document.querySelector(`.love-cell[data-li="${wi}"]`).classList.add('win-love'));
          setTimeout(showMessage, 700);
        }, 350);
      }
    }, step * 600);
  });
}

function showMessage() {
  const msg = document.getElementById('love-message');
  msg.innerHTML = 'No jogo do Amor,<br>você já ganhou meu coração.';
  msg.classList.add('show');
  document.getElementById('btn-close').style.display = 'inline-block';
  burstHearts();
}

function burstHearts() {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for (let i = 0; i < 28; i++) {
    const h = document.createElement('div');
    h.className = 'burst-heart';
    h.textContent = ['❤️','💕','💗','💖'][i%4];
    const angle = Math.random()*Math.PI*2;
    const dist  = 80 + Math.random()*220;
    h.style.left = cx+'px'; h.style.top = cy+'px';
    h.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    h.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    h.style.animationDelay = (Math.random()*.5)+'s';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 2000);
  }
}

document.getElementById('btn-close').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  scoreX = 0; scoreO = 0; roundNum = 1;
  refreshUI(); init();
});
</script>
<script>
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
</html>
